# ADR-011 §2 -- Promotion Gate Thresholds
# Changes to any threshold require an ADR-011 amendment; this is not a routine config push.
# Paper baseline Python module: agt_equities/paper_baseline.py

gates:

  G1:
    description: Shadow-vs-live decision divergence
    mean_bps_threshold: 3
    p99_bps_threshold: 5
    window_days: 14
    implemented: false
    blocked_by: "ADR-008 shadow_scan JSON bps-per-ticket persistence not yet shipped"

  G2:
    description: Zero Tier-0/Tier-1 internal invariant trips
    max_internal_tier01_trips: 0
    window_days: 14
    implemented: true
    source_table: incidents
    filter: "severity_tier <= 1 AND fault_source = 'internal'"

  G3:
    description: Minimum staged-decision sample size
    min_staged_decisions: 60
    min_staged_novel_engine: 120
    window_days: 14
    implemented: false
    blocked_by: "pending_orders missing engine column -- SQLiteOrderSink drops engine kwarg"

  G4:
    description: Broker rejection rate
    max_rejection_rate_pct: 0.1
    window_days: 14
    implemented: false
    blocked_by: "same as G3"

  G5:
    description: Operator override counterfactual P&L variance
    alpha: 0.05
    t_stat_threshold: 1.645
    min_settled_decisions: 30
    min_overrides_for_test: 5
    window_days: 14
    implemented: true
    source_table: decisions
    no_gate_engines:
      - cc_exit
      - roll_engine
      - csp_harvest

canary_phases:
  C1: {equity_cap_pct: 5,  bake_sessions: 5}
  C2: {equity_cap_pct: 15, bake_sessions: 5}
  C3: {equity_cap_pct: 50, bake_sessions: 10}
  C4: {equity_cap_pct: 100, bake_sessions: null}  # permanent
