# GitLab CI for AGT Equities — Decoupling Sprint A/B targeted runner.
#
# Why this exists:
#   The Linux sandbox we use for Cowork Architect work has Windows-mount
#   permission quirks (chmod 700 .pyc files we can't unlink, intermittent
#   .git/*.lock issues). Running pytest in a clean container sidesteps the
#   whole class of issue and gives us reproducible green/red signal.
#
# Scope today (Sprint A complete + Sprint B ramp):
#   Targeted run of the Sprint A + B unit tests only.
#
# Why not the full 975 baseline yet:
#   The full suite has 5 known pre-existing failures (4x test_margin_logic
#   async config, 1x test_phase3a R7) that block CI green. We'll broaden
#   to the full baseline in a follow-up after FU-ASYNCIO-CONFIG lands.
#
# ci-b1-followup (2026-04-14):
#   - Image pinned back to python:3.12-slim. Windows production runs
#     3.13.1; pinning CI to 3.10 reintroduced the PEP 701 f-string grammar
#     divergence and broke ast.parse(telegram_bot.py) in
#     test_a5e_atomic_cutover (legacy f-string at line ~8697 escapes
#     \u2014 which is legal on 3.12+ but not on 3.10).
#   - python-dotenv added to inline install list. agt_equities/config.py
#     imports dotenv at module load, so omitting it bombs every test that
#     imports config (all of test_agt_scheduler).

stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

.python_setup: &python_setup
  image: python:3.12-slim
  before_script:
    - python -V
    - pip install --no-cache-dir
        pytest==9.0.3
        pytest-asyncio==1.3.0
        hypothesis
        apscheduler
        pytz
        ib_async
        python-dotenv

sprint_a_unit_tests:
  <<: *python_setup
  stage: test
  script:
    - pytest -v --tb=short
        tests/test_ib_conn.py
        tests/test_agt_scheduler.py
        tests/test_health.py
        tests/test_flex_sync_atomic.py
        tests/test_a5e_atomic_cutover.py
        tests/test_b1_pending_order_children_schema.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
