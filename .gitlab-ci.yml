# GitLab CI for AGT Equities — Decoupling Sprint A targeted runner.
#
# Why this exists:
#   The Linux sandbox we use for Cowork Architect work has Windows-mount
#   permission quirks (chmod 700 .pyc files we can't unlink, intermittent
#   .git/*.lock issues). Running pytest in a clean container sidesteps the
#   whole class of issue and gives us reproducible green/red signal.
#
# Scope today (A1..A4):
#   Targeted run of the Sprint A unit tests only:
#     - tests/test_ib_conn.py             (A1)
#     - tests/test_agt_scheduler.py       (A1, A2)
#     - tests/test_health.py              (A2)
#     - tests/test_flex_sync_atomic.py    (A3)
#     - tests/test_a4_init_db_lazy.py     (A4)
#     - tests/test_alerts.py              (A5b)
#     - tests/test_a5d_consumer_wired.py  (A5d)
#     - tests/test_a5dc_dead_buffer_removed.py (A5d.c)
#     - tests/test_b5c_scan_bridge.py    (B5.c-bridge-1)
#     - tests/test_bridge2_extras.py tests/test_csp_allocator.py tests/test_telegram_ui/     (bridge-2 extras)
#
# Why not the full 975 baseline yet:
#   The full suite has 5 known pre-existing failures (4x test_margin_logic
#   async config, 1x test_phase3a R7) that block CI green. We'll broaden
#   to the full baseline in a follow-up after FU-ASYNCIO-CONFIG lands.
#
# Post-A3 compute-efficiency batch #1 (infra/ci-efficiency-batch-1):
#   * Dependency versions live in requirements-ci.txt (single source of
#     truth, cache-key input).
#   * pip downloads are cached under $CI_PROJECT_DIR/.cache/pip keyed on
#     the requirements-ci.txt hash. First run on a branch = Cache miss,
#     subsequent pushes = Cache restored + pip install in seconds.
#   * Test collection pairs the `sprint_a` pytest marker with an explicit
#     file list. The marker is the semantic gate (adding a new test inside
#     these files takes the decorator and nothing else); the file list
#     scopes collection so unrelated tests/*.py files — which pull heavy
#     deps (telegram, fastapi, full project stack) that are NOT in
#     requirements-ci.txt — don't bomb import-time collection. Adding a
#     new Sprint A *file* = one-line CI edit; adding a new Sprint A
#     *test* inside an existing file = zero CI edits.

# -------------------------------------------------------------------
# Compute-minute discipline — workflow:rules
# -------------------------------------------------------------------
# Problem (observed 2026-04-16): 337 pipelines in 6 days burned the free
# tier 400-minute quota. 26% of runs were duplicates — a branch push with
# an open MR triggered BOTH a branch pipeline AND a merge_request_event
# pipeline for the same SHA.
#
# Fix: only run ONE pipeline per code state.
#   - If an MR is open for the branch → MR event pipeline runs, branch
#     push pipeline is skipped (dedup).
#   - If no MR is open yet → branch push pipeline runs (lets pre-MR smoke
#     tests still run on feature branches).
#   - main gets its own pipeline on push (post-merge canonical signal).
#
# Also: commits with `[skip ci]` in the message are honored by GitLab and
# consume zero minutes — use for docs/notes/memory-only changes.
workflow:
  rules:
    # Merge-request event pipelines always run
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip branch-push pipeline when an MR is already open for the branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # main post-merge pipeline (canonical signal after squash-merge)
    - if: $CI_COMMIT_BRANCH == "main"
    # Feature-branch first push (before MR exists)
    - if: $CI_COMMIT_BRANCH

stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # telegram_bot.py reads these at import time. Fakes are sufficient for
  # test collection + live-import — no network calls occur in sprint_a tests.
  TELEGRAM_BOT_TOKEN: "ci_fake_bot_token_not_used"
  TELEGRAM_USER_ID: "0"
  ANTHROPIC_API_KEY: "ci_fake_anthropic_key_not_used"
  FINNHUB_API_KEY: "ci_fake_finnhub_key_not_used"

.python_setup: &python_setup
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements-ci.txt
      prefix: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/pip/
  before_script:
    - python -V
    - pip install -r requirements-ci.txt

sprint_a_unit_tests:
  <<: *python_setup
  stage: test
  script:
    - pytest -v --tb=short -m sprint_a tests/test_ib_conn.py tests/test_agt_scheduler.py tests/test_health.py tests/test_flex_sync_atomic.py tests/test_a5e_atomic_cutover.py tests/test_b1_pending_order_children_schema.py tests/test_b2_cc_fill_permid_retry.py tests/test_b3_children_writer.py tests/test_b4_fa_block_reader.py tests/test_b5_fa_block_margin.py tests/test_b5b_m1x_integration.py tests/test_b5c_scan_bridge.py tests/test_inception_delta_fill.py tests/test_a4_init_db_lazy.py tests/test_alerts.py tests/test_conviction.py tests/test_a5d_consumer_wired.py tests/test_a5dc_dead_buffer_removed.py tests/test_roll_engine.py tests/test_fill_log_schema.py tests/test_b_fill_log_composite_pk.py tests/test_bridge2_extras.py tests/test_csp_allocator.py tests/test_telegram_ui/ tests/test_breaker_status_filter.py tests/test_paper_auto_execute.py tests/test_invariants.py tests/test_incidents_repo.py tests/test_invariants_heartbeat.py tests/test_invariants_tick.py tests/test_cmd_rem_redirect.py tests/test_incidents_digest.py tests/test_circuit_breaker_heartbeat.py tests/test_author_critic.py tests/test_nssm_install_script.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
# B3 CI file list refresh
