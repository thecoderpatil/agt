<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AGT Command Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-variant-numeric: tabular-nums; }
        .num { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
    <link rel="stylesheet" href="/static/app.css?t={{ token }}">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col {% if paper_mode %}border-4 border-blue-500{% endif %}">
    {% if paper_mode %}
    <div class="sticky top-0 z-50 w-full bg-blue-600 text-white text-center py-1 font-mono text-sm font-bold border-b-2 border-blue-400">
      ⚠ PAPER TRADING — simulated orders only ⚠
    </div>
    {% endif %}
    {% block content %}{% endblock %}
    <script src="/static/app.js?t={{ token }}"></script>
</body>
</html>
